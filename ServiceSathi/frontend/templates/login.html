{% extends "base.html" %}

{% block content %}

<h1 class="title">Service Sathi</h1>

<div class="login-box">

    <form action="/login" method="POST" class="login-form">

        <label id="identifier-label">Username *</label>

        <input type="text"
               name="identifier"
               id="login-id"
               placeholder="username"
               required>

        <label>Password *</label>
        <input type="password" name="password" placeholder="********" required>

        <div class="role-select">

            <label>
                <input type="radio" name="role" value="user" checked onclick="changeLoginType()"> User
            </label>

            <label>
                <input type="radio" name="role" value="seller" onclick="changeLoginType()"> Service provider
            </label>

            <label>
                <input type="radio" name="role" value="admin" onclick="changeLoginType()"> Admin
            </label>

        </div>

        <button type="submit" class="login-btn">Log in</button>

    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

</div>

<script>
function changeLoginType() {

    const role = document.querySelector('input[name="role"]:checked').value;
    const inputField = document.getElementById("login-id");
    const label = document.getElementById("identifier-label");

    if (role === "admin") {
        inputField.placeholder = "admin email";
        label.innerText = "Admin Email *";
    } else {
        inputField.placeholder = "username";
        label.innerText = "Username *";
    }
}
</script>

{% endblock %}
