{% extends "base.html" %}

{% block content %}
<div class="form-container-box" style="max-width: 700px;">
    <h1 class="page-heading" style="text-align: center; margin-top: 0;">Edit Profile</h1>

    <form action="/edit_profile" method="POST" enctype="multipart/form-data">


            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">

                <div style="grid-column: span 2; margin-bottom: 25px; text-align: center;">
                <div style="position: relative; display: inline-block;">
                <label for="file-upload" class="view-btn" style="cursor: pointer; display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--primary); color: white; border-radius: 8px; transition: all 0.3s ease;">
                    <span>📷</span> Change Profile Photo
                </label>
            
                <input id="file-upload" type="file" name="profile_image" accept="image/*" onchange="updateFileName(this)" style="display: none;">
            
                <p id="file-name" style="font-size: 12px; color: #94a3b8; margin-top: 8px;"></p>
                </div>
            </div>
            <div>
                <label style="color: var(--primary); font-weight: 600; font-size: 14px;">Full Name</label>
                <input type="text" name="full_name" class="form-input-field" value="{{ profile.name }}" required>
            </div>

            <div>
                <label style="color: var(--primary); font-weight: 600; font-size: 14px;">Email</label>
                <input type="email" name="email" class="form-input-field" value="{{ profile.email }}" required>
            </div>

            <div>
                <label style="color: var(--primary); font-weight: 600; font-size: 14px;">Phone</label>
                <input type="text" name="phone" class="form-input-field" value="{{ profile.phone }}" required>
            </div>

            <div>
                <label style="color: var(--primary); font-weight: 600; font-size: 14px;">Residential Address</label>
                <input type="text" name="address" class="form-input-field" value="{{ profile.address }}" required>
            </div>

            {% if session.role == 'seller' %}
            <div style="grid-column: span 2;">
                <label style="color: var(--primary); font-weight: 600; font-size: 14px;">Professional Bio</label>
                <textarea name="bio" class="form-input-field" style="height: 100px;">{{ profile.bio }}</textarea>
            </div>
            {% endif %}

            <div style="grid-column: span 2; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-color);">
                <label style="color: var(--primary); font-weight: 600; font-size: 14px;">New Password (leave blank to keep current)</label>
                <input type="password" name="password" class="form-input-field" placeholder="********">
            </div>
        </div>

        <div style="display: flex; gap: 15px; margin-top: 30px;">
            <a href="/dashboard" class="view-btn" style="flex: 1; text-align: center; background: rgba(255,255,255,0.05); color: white;">Cancel</a>
            <button type="submit" class="form-submit-btn" style="flex: 2; margin-top: 0;">Save Changes</button>
        </div>
    </form>
    <script>
    function updateFileName(input) {
        const fileNameDisplay = document.getElementById('file-name');
        if (input.files && input.files.length > 0) {
            fileNameDisplay.innerText = "Selected: " + input.files[0].name;
        }
    }
    </script>
    {% if error %}
        <p style="color: #fca5a5; text-align: center; margin-top: 15px;">{{ error }}</p>
    {% endif %}
</div>
{% endblock %}
